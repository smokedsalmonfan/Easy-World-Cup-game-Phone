<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WC MANAGER V18</title>

<style>
body{
margin:0;
font-family:"Courier New", monospace;
background:#050816;
color:#00ff99;
text-align:center;
}

body::before{
content:"";
position:fixed;
inset:0;
background:repeating-linear-gradient(
0deg,
rgba(255,255,255,0.03),
rgba(255,255,255,0.03) 1px,
transparent 1px,
transparent 3px
);
pointer-events:none;
}

.screen{display:none;padding:10px;}
.screen.active{display:block;}

header{
background:#0b1b3a;
padding:10px;
color:#00e5ff;
text-shadow:0 0 10px #00e5ff;
font-weight:bold;
letter-spacing:2px;
}

.card{
background:#0d1025;
border:1px solid #00ff99;
margin:6px;
padding:10px;
cursor:pointer;
}

.btn{
background:#111a3a;
border:1px solid #00e5ff;
color:#00e5ff;
padding:10px;
margin:5px;
box-shadow:0 0 8px #00e5ff;
}

.score{
font-size:40px;
color:#ff00ff;
text-shadow:0 0 10px #ff00ff;
margin:10px;
}

/* ================= PITCH ================= */
#pitch{
width:90%;
max-width:380px;
height:260px;
margin:10px auto;
border:3px solid #00ff99;
background:linear-gradient(#0a5c2a,#0c7a36);
position:relative;
overflow:hidden;
box-shadow:0 0 15px #00ff99;
}

.line{
position:absolute;
background:white;
opacity:0.5;
}

.midline{
width:100%;
height:2px;
top:50%;
}

.box{
width:30%;
height:60%;
top:20%;
border:2px solid white;
position:absolute;
}

.left{left:0;}
.right{right:0;}

.ball{
width:12px;
height:12px;
border-radius:50%;
background:yellow;
position:absolute;
box-shadow:0 0 10px yellow;
}

.player{
width:10px;
height:10px;
border-radius:50%;
background:white;
position:absolute;
opacity:0.6;
}

.log{
height:120px;
overflow:auto;
text-align:left;
background:#05060f;
border:1px solid #00ff99;
padding:6px;
font-size:12px;
}
</style>
</head>

<body>

<div id="menu" class="screen active">
<header>⚽ WC MANAGER V18 ⚽</header>
<h3>Select Team</h3>
<div id="teams"></div>
</div>

<div id="game" class="screen">
<header id="title"></header>

<div>Score</div>
<div class="score" id="score">0 - 0</div>

<div id="pitch">
<div class="line midline"></div>
<div class="box left"></div>
<div class="box right"></div>

<div class="ball" id="ball"></div>
</div>

<button class="btn" onclick="tactic('attack')">ATTACK</button>
<button class="btn" onclick="tactic('balanced')">BALANCED</button>
<button class="btn" onclick="tactic('defend')">DEFEND</button>

<div class="log" id="log"></div>

<button class="btn" onclick="exitMatch()">EXIT</button>
</div>

<script>

/* ================= TEAMS ================= */
const FLAGS={
Brazil:"🇧🇷",Argentina:"🇦🇷",France:"🇫🇷",England:"🏴",
Germany:"🇩🇪",Spain:"🇪🇸",Portugal:"🇵🇹",Italy:"🇮🇹",
Netherlands:"🇳🇱",USA:"🇺🇸",Japan:"🇯🇵"
};

const NATIONS=Object.keys(FLAGS);

let teams=[];
let player=0;
let match=null;
let timer=null;

/* ================= INIT ================= */
window.onload=()=>{
teams=NATIONS.map(n=>makeTeam(n));
renderTeams();
};

function makeTeam(n){
return{
name:n,
flag:FLAGS[n],
att:60+Math.random()*30,
mid:60+Math.random()*30,
def:60+Math.random()*30
};
}

/* ================= UI ================= */
function renderTeams(){
let box=document.getElementById("teams");
teams.forEach((t,i)=>{
let d=document.createElement("div");
d.className="card";
d.innerHTML=t.flag+" "+t.name;
d.onclick=()=>start(i);
box.appendChild(d);
});
}

function show(id){
document.querySelectorAll(".screen")
.forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

/* ================= MATCH ================= */
function start(i){

player=i;
show("game");

let A=teams[i];
let B=teams[(i+1)%teams.length];

match={
a:A,b:B,
ga:0,gb:0,
min:0,
ballX:50,
ballY:50,
log:[],
tactic:"balanced"
};

document.getElementById("title").innerText=
A.flag+" "+A.name+" vs "+B.flag+" "+B.name;

clearInterval(timer);
timer=setInterval(loop,200);
}

/* ================= TACTIC ================= */
function tactic(t){
match.tactic=t;
log("TACTIC "+t);
}

/* ================= LOG ================= */
function log(t){
match.log.push(t);
if(match.log.length>6) match.log.shift();
}

/* ================= PITCH UPDATE ================= */
function moveBall(){

let baseA=match.a.att+match.a.mid;
let baseB=match.b.att+match.b.mid;

if(match.tactic==="attack") baseA*=1.1;
if(match.tactic==="defend") baseA*=0.9;

let total=baseA+baseB;
let dir=baseA/total;

/* ball movement left-right */
match.ballX += (dir-0.5)*10;

/* clamp */
match.ballX=Math.max(5,Math.min(95,match.ballX));

/* vertical randomness */
match.ballY += (Math.random()-0.5)*15;
match.ballY=Math.max(10,Math.min(90,match.ballY));

document.getElementById("ball").style.left=match.ballX+"%";
document.getElementById("ball").style.top=match.ballY+"%";

/* zones */
if(match.ballX>80){
tryGoal(match.a,match.b);
}
if(match.ballX<20){
tryGoal(match.b,match.a);
}

}

/* ================= GOAL SYSTEM ================= */
function tryGoal(att,def){

if(Math.random()<0.08){

let shot=att.att+Math.random()*40;
let save=def.def+Math.random()*40;

if(shot>save){
if(att===match.a) match.ga++;
else match.gb++;

log("⚽ GOAL "+att.flag);
match.ballX=50;
match.ballY=50;
}else{
log("🥅 SAVE");
match.ballX=50;
match.ballY=50;
}
}
}

/* ================= LOOP ================= */
function loop(){

match.min++;

moveBall();

/* UI */
document.getElementById("score").innerText=
match.ga+" - "+match.gb;

document.getElementById("log").innerHTML=
match.log.join("<br>");

if(match.min>=90){
clearInterval(timer);
log("FULL TIME");
}
}

/* ================= EXIT ================= */
function exitMatch(){
clearInterval(timer);
show("menu");
}

</script>

</body>
</html>
