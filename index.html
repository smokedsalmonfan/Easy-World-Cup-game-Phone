<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WC Manager V9</title>

<style>
body { margin:0; font-family:Arial; background:#0a1428; color:white; text-align:center; }
.screen { display:none; padding:10px; }
.screen.active { display:block; }
header { background:#1e3a8a; padding:10px; font-weight:bold; }
.btn { padding:10px; margin:5px; background:#2563eb; border:none; color:white; border-radius:8px; }
.card { background:#1f2937; margin:5px; padding:8px; border-radius:6px; }
.log { height:180px; overflow:auto; background:#111827; text-align:left; padding:8px; font-size:13px; }
.score { font-size:34px; margin:10px; }
.bar { height:10px; background:#22c55e; }
.container { background:#1f2937; margin:10px; padding:6px; border-radius:6px; }
</style>
</head>

<body>

<div id="menu" class="screen active">
<header>WC MANAGER V9 — 48 TEAM WORLD CUP</header>
<h3>Select Your Team</h3>
<div id="teams"></div>
</div>

<div id="groups" class="screen">
<header>GROUP STAGE</header>
<div id="table"></div>
<button class="btn" onclick="playMatch()">Play Match</button>
</div>

<div id="match" class="screen">
<header id="title"></header>

<div class="container">
Possession
<div id="posBar" class="bar" style="width:50%"></div>
</div>

<div class="score" id="score">0 - 0</div>

<div class="log" id="log"></div>

<button class="btn" onclick="endMatch()">Exit</button>
</div>

<script>

// ================= REALISTIC 48-TEAM POOL =================
const NATIONS = [
"Brazil","Argentina","France","England","Germany","Spain","Portugal","Italy","Netherlands","Belgium","Croatia","Uruguay","Colombia","Chile","Peru","Ecuador","Paraguay","Venezuela",
"USA","Mexico","Canada","Costa Rica","Panama","Honduras","Jamaica",
"Morocco","Senegal","Nigeria","Egypt","Algeria","Tunisia","Cameroon","Ghana","Ivory Coast","Mali",
"Japan","South Korea","Iran","Saudi Arabia","Australia","Qatar","Uzbekistan","Iraq",
"Norway","Sweden","Denmark","Switzerland","Poland","Serbia","Ukraine","Turkey"
];

// ================= TEAM BUILDER =================
function buildTeam(name){
let base = Math.random();

return {
name,
group:String.fromCharCode(65+Math.floor(Math.random()*12)),
style: base>0.6?"attack":base>0.3?"balanced":"defensive",
players:[
{role:"ST",att:75+Math.random()*20,fin:75+Math.random()*20,def:30},
{role:"MID",att:65+Math.random()*20,fin:65+Math.random()*20,def:70},
{role:"DEF",att:40+Math.random()*10,fin:40+Math.random()*10,def:80}
]
};
}

const TEAMS = NATIONS.map(n=>buildTeam(n));

let playerTeam=null;
let groups={};
let match=null;
let interval=null;

// ================= INIT =================
function init(){
let div=document.getElementById("teams");
TEAMS.forEach((t,i)=>{
let d=document.createElement("div");
d.className="card";
d.innerHTML=t.name;
d.onclick=()=>select(i);
div.appendChild(d);
});
}

function select(i){
playerTeam=i;
buildGroups();
show("groups");
renderGroups();
}

// ================= GROUPS =================
function buildGroups(){
groups={};

// FIXED 12 GROUPS A–L
for(let i=0;i<12;i++) groups[String.fromCharCode(65+i)]=[];

TEAMS.forEach((t,i)=>{
groups[String.fromCharCode(65+(i%12))].push({...t,pts:0});
});
}

function renderGroups(){
let html="";
Object.keys(groups).forEach(g=>{
html+="<h3>Group "+g+"</h3>";
groups[g].forEach(t=>{
html+=`<div>${t.name} ${t.pts} pts</div>`;
});
});
document.getElementById("table").innerHTML=html;
}

// ================= ENGINE =================
function power(t){
let a=0,f=0,d=0;
t.players.forEach(p=>{
a+=p.att; f+=p.fin; d+=p.def;
});
return {att:a/3, fin:f/3, def:d/3};
}

function possession(a,b){
let A=power(a), B=power(b);
return 50 + (A.att - B.att)*0.25;
}

function scorer(team){
let pool=[];
team.players.forEach(p=>{
let w=p.att+p.fin;
for(let i=0;i<w;i++) pool.push(p);
});
return pool[Math.floor(Math.random()*pool.length)];
}

// ================= MATCH =================
function startMatch(a,b){

match={a,b,ga=0,gb=0,min:0,log:[],pos:50};

show("match");
document.getElementById("title").innerText=
a.name+" vs "+b.name;

interval=setInterval(sim,210);
}

function sim(){

match.min++;

let A=power(match.a);
let B=power(match.b);

match.pos=possession(match.a,match.b);

// attack phase (reduced frequency for realism)
if(Math.random()<0.08){

let aChance=A.att/(A.att+B.def);

if(Math.random()<aChance){

if(Math.random()<0.30){
match.ga++;
let s=scorer(match.a);
match.log.push("⚽ "+s.role+" scores for "+match.a.name);
}else{
match.log.push("🧤 Save by "+match.b.name);
}

}else{

if(Math.random()<0.28){
match.gb++;
let s=scorer(match.b);
match.log.push("⚽ "+s.role+" scores for "+match.b.name);
}else{
match.log.push("❌ Miss!");
}

}
}

update();

if(match.min>90) clearInterval(interval);
}

// ================= UI =================
function update(){
document.getElementById("score").innerText=
match.ga+" - "+match.gb;

document.getElementById("log").innerHTML=
match.log.slice(-7).join("<br>");

document.getElementById("posBar").style.width=
match.pos+"%";
}

// ================= FLOW =================
function playMatch(){
startMatch(TEAMS[0],TEAMS[1]);
}

function endMatch(){
clearInterval(interval);
show("groups");
renderGroups();
}

// ================= UTIL =================
function show(id){
document.querySelectorAll(".screen")
.forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

init();

</script>

</body>
</html>
