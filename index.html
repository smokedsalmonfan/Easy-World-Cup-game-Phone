<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WC Manager V6</title>

<style>
body { margin:0; font-family:Arial; background:#0a1428; color:#fff; text-align:center; }
.screen { display:none; padding:10px; }
.screen.active { display:block; }
header { background:#1e3a8a; padding:10px; font-weight:bold; }
.btn { padding:10px; margin:5px; background:#2563eb; border:none; color:#fff; border-radius:8px; }
.card { background:#1f2937; margin:5px; padding:8px; border-radius:6px; }
.log { height:160px; overflow:auto; background:#111827; text-align:left; padding:8px; font-size:13px; }
.score { font-size:34px; }
</style>
</head>

<body>

<div id="menu" class="screen active">
<header>WC MANAGER V6</header>
<h3>Select Team</h3>
<div id="teams"></div>
</div>

<div id="groups" class="screen">
<header>GROUP STAGE</header>
<div id="table"></div>
<button class="btn" onclick="playMatch()">Play Match</button>
<button class="btn" onclick="showKnockout()">Knockout</button>
</div>

<div id="match" class="screen">
<header id="title"></header>
<div class="score" id="score">0 - 0</div>
<div class="log" id="log"></div>
<button class="btn" onclick="endMatch()">Exit</button>
</div>

<script>

// ================= FBREF-STYLE DATA =================
const TEAMS = [
{
name:"Brazil",group:"A",style:"attack",
players:[
{name:"Vinícius Jr",att:94,fin:92,def:40,stam:88},
{name:"Rodrygo",att:88,fin:86,def:45,stam:82},
{name:"Casemiro",att:70,fin:65,def:92,stam:90}
]
},
{
name:"France",group:"A",style:"balanced",
players:[
{name:"Mbappé",att:96,fin:95,def:42,stam:92},
{name:"Griezmann",att:88,fin:86,def:70,stam:85},
{name:"Tchouaméni",att:72,fin:70,def:90,stam:88}
]
},
{
name:"England",group:"B",style:"balanced",
players:[
{name:"Kane",att:92,fin:95,def:50,stam:86},
{name:"Saka",att:88,fin:86,def:60,stam:84},
{name:"Bellingham",att:90,fin:84,def:82,stam:90}
]
},
{
name:"Argentina",group:"B",style:"attack",
players:[
{name:"Messi",att:95,fin:94,def:45,stam:75},
{name:"Álvarez",att:88,fin:88,def:55,stam:84},
{name:"De Paul",att:80,fin:78,def:80,stam:85}
]
}
];

let playerTeam=null;
let groups={};
let match=null;
let interval=null;

// ================= INIT =================
function init(){
let div=document.getElementById("teams");
TEAMS.forEach((t,i)=>{
let d=document.createElement("div");
d.className="card";
d.innerHTML=t.name;
d.onclick=()=>select(i);
div.appendChild(d);
});
}

function select(i){
playerTeam=i;
buildGroups();
show("groups");
renderGroups();
}

// ================= GROUPS =================
function buildGroups(){
groups={};
TEAMS.forEach(t=>{
if(!groups[t.group]) groups[t.group]=[];
groups[t.group].push({...t,pts:0});
});
}

function renderGroups(){
let html="";
Object.keys(groups).forEach(g=>{
html+="<h3>Group "+g+"</h3>";
groups[g].forEach(t=>{
html+=`<div>${t.name} ${t.pts} pts</div>`;
});
});
document.getElementById("table").innerHTML=html;
}

// ================= ENGINE =================
function teamPower(team){
let a=0,f=0,d=0,s=0;

team.players.forEach(p=>{
a+=p.att;
f+=p.fin;
d+=p.def;
s+=p.stam;
});

return {
attack:a/team.players.length,
fin:f/team.players.length,
def:d/team.players.length,
stam:s/team.players.length
};
}

function xG(att,def){
return (att.attack*att.fin*att.stam) /
((def.def*def.stam)+1);
}

// ================= MATCH =================
function startMatch(a,b){

match={a,b,ga:0,gb:0,min:0,log:[],subs:false};

show("match");
document.getElementById("title").innerText=
a.name+" vs "+b.name;

interval=setInterval(sim,180);
}

function sim(){

match.min++;

let A=teamPower(match.a);
let B=teamPower(match.b);

let aChance=xG(A,B);
let bChance=xG(B,A);

// fatigue drop
A.stam-=0.05;
B.stam-=0.05;

// substitution trigger
if(match.min===60 && !match.subs){
match.subs=true;
match.log.push("🔁 Tactical substitutions made");
A.attack+=3;
B.attack+=3;
}

// goal logic
if(Math.random()<0.10){

if(Math.random()<aChance/(aChance+bChance)){
match.ga++;
match.log.push("⚽ "+match.a.players[0].name+" GOAL!");
}else{
match.gb++;
match.log.push("⚽ "+match.b.players[0].name+" GOAL!");
}
}

update();

if(match.min>90) clearInterval(interval);
}

// ================= UI =================
function update(){
document.getElementById("score").innerText=
match.ga+" - "+match.gb;

document.getElementById("log").innerHTML=
match.log.slice(-6).join("<br>");
}

// ================= FLOW =================
function playMatch(){
startMatch(TEAMS[0],TEAMS[1]);
}

function endMatch(){
clearInterval(interval);
show("groups");
renderGroups();
}

// ================= UTIL =================
function show(id){
document.querySelectorAll(".screen")
.forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

init();

</script>

</body>
</html>
q
