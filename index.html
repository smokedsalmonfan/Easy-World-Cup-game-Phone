<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WC Manager 2026</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0a1428">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="icon-192.png">

<style>
body { margin:0; background:#0a1428; color:#fff; font-family:Arial; text-align:center; }
.screen { display:none; padding:10px; }
.screen.active { display:block; }
header { background:#1e3a8a; padding:10px; font-weight:bold; }
.btn { padding:10px; margin:5px; background:#2563eb; color:#fff; border:none; border-radius:8px; }
.team { padding:8px; margin:5px; background:#1e2937; border-radius:6px; }
.log { height:160px; overflow:auto; background:#111827; padding:8px; text-align:left; }
.pitch { height:200px; background:#166534; margin:10px; position:relative; }
.ball { width:12px; height:12px; background:#facc15; border-radius:50%; position:absolute; }
</style>
</head>

<body>

<div id="menu" class="screen active">
<header>WC MANAGER 2026</header>
<h3>Select Team</h3>
<div id="teams"></div>
</div>

<div id="groups" class="screen">
<header>GROUPS</header>
<div id="table"></div>
<button class="btn" onclick="nextMatchday()">Next Matchday</button>
</div>

<div id="match" class="screen">
<header id="matchTitle"></header>
<div id="score" style="font-size:30px">0 - 0</div>
<div class="pitch"><div class="ball" id="ball"></div></div>
<div class="log" id="log"></div>
<button class="btn" onclick="endMatch()">End Match</button>
</div>

<script>
const teams = [
 {id:1,name:"Brazil",rating:88,group:"A"},
 {id:2,name:"France",rating:87,group:"A"},
 {id:3,name:"England",rating:85,group:"B"},
 {id:4,name:"Argentina",rating:89,group:"B"},
 {id:5,name:"Germany",rating:84,group:"C"},
 {id:6,name:"Spain",rating:86,group:"C"},
 {id:7,name:"Portugal",rating:83,group:"D"},
 {id:8,name:"Netherlands",rating:82,group:"D"}
];

let playerTeam = null;
let groups = {};
let currentMatch = null;
let interval = null;

function init() {
    let div = document.getElementById("teams");
    teams.forEach(t=>{
        let d = document.createElement("div");
        d.className="team";
        d.innerHTML=t.name;
        d.onclick=()=>selectTeam(t.id);
        div.appendChild(d);
    });
}

function selectTeam(id){
    playerTeam=id;
    buildGroups();
    show("groups");
    renderGroups();
}

function buildGroups(){
    groups={};
    teams.forEach(t=>{
        if(!groups[t.group]) groups[t.group]=[];
        groups[t.group].push({...t,pts:0,gf:0,ga:0});
    });
}

function renderGroups(){
    let html="";
    Object.keys(groups).forEach(g=>{
        html+="<h3>Group "+g+"</h3>";
        groups[g].sort((a,b)=>b.pts-a.pts);
        groups[g].forEach(t=>{
            html+=`<div>${t.name} ${t.pts} pts</div>`;
        });
    });
    document.getElementById("table").innerHTML=html;
}

function nextMatchday(){
    let match = {home:teams[0],away:teams[1],hg:0,ag:0,log:[]};
    startMatch(match);
}

function startMatch(m){
    currentMatch=m;
    show("match");
    document.getElementById("matchTitle").innerText=m.home.name+" vs "+m.away.name;

    let minute=0;
    interval=setInterval(()=>{
        minute++;
        simulate(m);
        updateUI(m);
        if(minute>90){clearInterval(interval);}
    },300);
}

function simulate(m){
    let h=m.home.rating;
    let a=m.away.rating;
    let ph=h/(h+a);

    if(Math.random()<0.08){
        if(Math.random()<ph){m.hg++; m.log.push("⚽ HOME GOAL");}
        else {m.ag++; m.log.push("⚽ AWAY GOAL");}
    }
}

function updateUI(m){
    document.getElementById("score").innerText=m.hg+" - "+m.ag;
    document.getElementById("log").innerHTML=m.log.slice(-6).join("<br>");
    let b=document.getElementById("ball");
    b.style.left=Math.random()*90+"%";
    b.style.top=Math.random()*90+"%";
}

function endMatch(){
    clearInterval(interval);
    show("groups");
    renderGroups();
}

function show(id){
    document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
    document.getElementById(id).classList.add("active");
}

init();
</script>

</body>
</html>
