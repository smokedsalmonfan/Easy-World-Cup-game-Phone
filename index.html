<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WC Manager V10.1</title>

<style>
body { margin:0; font-family:Arial; background:#0a1428; color:white; text-align:center; }
.screen { display:none; padding:10px; }
.screen.active { display:block; }
header { background:#1e3a8a; padding:10px; font-weight:bold; }
.card { background:#1f2937; margin:6px; padding:10px; border-radius:8px; cursor:pointer; }
.btn { padding:10px; margin:5px; background:#2563eb; border:none; color:white; border-radius:8px; }
.smallbtn { padding:6px; margin:3px; font-size:12px; }
.log { height:160px; overflow:auto; background:#111827; text-align:left; padding:8px; font-size:13px; }
.score { font-size:36px; margin:10px; }
.bar { height:10px; background:#22c55e; }
.container { background:#1f2937; margin:10px; padding:6px; border-radius:6px; }
</style>
</head>

<body>

<div id="menu" class="screen active">
<header>WC MANAGER V10.1</header>
<h3>Select Your Nation</h3>
<div id="teams"></div>
</div>

<div id="groups" class="screen">
<header>GROUP STAGE</header>
<div id="table"></div>
<button class="btn" onclick="startNextMatch()">Play Match</button>
</div>

<div id="match" class="screen">
<header id="title"></header>

<div class="container">
Minute: <span id="min">0</span>
</div>

<div class="container">
Possession
<div id="posBar" class="bar" style="width:50%"></div>
</div>

<div class="score" id="score">0 - 0</div>

<div>
<button class="btn smallbtn" onclick="tactic('attack')">ATTACK</button>
<button class="btn smallbtn" onclick="tactic('balanced')">BALANCED</button>
<button class="btn smallbtn" onclick="tactic('defend')">DEFEND</button>
</div>

<div class="log" id="log"></div>

<button class="btn" onclick="endMatch()">Exit</button>
</div>

<script>

// ================= FLAGS =================
const FLAGS = {
"Brazil":"🇧🇷","Argentina":"🇦🇷","France":"🇫🇷","England":"🏴","Germany":"🇩🇪",
"Spain":"🇪🇸","Portugal":"🇵🇹","Italy":"🇮🇹","Netherlands":"🇳🇱","Belgium":"🇧🇪",
"Croatia":"🇭🇷","Uruguay":"🇺🇾","Colombia":"🇨🇴","USA":"🇺🇸","Mexico":"🇲🇽",
"Canada":"🇨🇦","Japan":"🇯🇵","South Korea":"🇰🇷","Morocco":"🇲🇦","Senegal":"🇸🇳",
"Nigeria":"🇳🇬","Egypt":"🇪🇬","Australia":"🇦🇺","Switzerland":"🇨🇭","Denmark":"🇩🇰",
"Poland":"🇵🇱","Serbia":"🇷🇸","Turkey":"🇹🇷","Norway":"🇳🇴","Sweden":"🇸🇪",
"Ukraine":"🇺🇦","Algeria":"🇩🇿","Tunisia":"🇹🇳","Cameroon":"🇨🇲","Ghana":"🇬🇭",
"Peru":"🇵🇪","Chile":"🇨🇱","Ecuador":"🇪🇨","Paraguay":"🇵🇾","Venezuela":"🇻🇪",
"Iran":"🇮🇷","Saudi Arabia":"🇸🇦","Qatar":"🇶🇦","Iraq":"🇮🇶"
};

// ================= TEAMS =================
const NATIONS = Object.keys(FLAGS);

let TEAMS=[];
let playerIndex=null;
let groups={};
let match=null;
let interval=null;

window.onload=()=>{
TEAMS=NATIONS.map(n=>build(n));
renderTeams();
};

function build(name){
return {
name,
flag:FLAGS[name],
group:String.fromCharCode(65+Math.floor(Math.random()*12)),
players:[
{att:80+Math.random()*10,def:60},
{att:70+Math.random()*10,def:70},
{att:60+Math.random()*10,def:80}
]
};
}

// ================= UI =================
function renderTeams(){
let div=document.getElementById("teams");
TEAMS.forEach((t,i)=>{
let d=document.createElement("div");
d.className="card";
d.innerHTML=t.flag+" "+t.name;
d.onclick=()=>select(i);
div.appendChild(d);
});
}

function select(i){
playerIndex=i;
buildGroups();
show("groups");
renderGroups();
}

// ================= GROUPS =================
function buildGroups(){
groups={};
for(let i=0;i<12;i++) groups[String.fromCharCode(65+i)]=[];

TEAMS.forEach((t,i)=>{
groups[String.fromCharCode(65+(i%12))].push({...t,pts:0});
});
}

function renderGroups(){
let html="";
Object.keys(groups).forEach(g=>{
html+="<h3>Group "+g+"</h3>";
groups[g].forEach(t=>{
html+=`<div>${t.flag} ${t.name}</div>`;
});
});
document.getElementById("table").innerHTML=html;
}

// ================= MATCH ENGINE =================
function power(t){
let a=0,d=0;
t.players.forEach(p=>{
a+=p.att; d+=p.def;
});
return {att:a/3,def:d/3};
}

function possession(a,b){
let A=power(a),B=power(b);
return 50+(A.att-B.att)*0.3;
}

function scorer(team){
let pool=[];
team.players.forEach(p=>{
for(let i=0;i<p.att;i++) pool.push(p);
});
return pool[Math.floor(Math.random()*pool.length)];
}

// ================= MATCH =================
function startMatch(a,b){
match={
a,b,
ga:0,gb:0,
min:0,
pos:50,
tacticA:"balanced",
tacticB:"balanced",
log:[]
};

show("match");

document.getElementById("title").innerText=
a.flag+" "+a.name+" vs "+b.flag+" "+b.name;

interval=setInterval(sim,200);
}

function sim(){

match.min++;
document.getElementById("min").innerText=match.min;

let A=power(match.a);
let B=power(match.b);

// tactics effect
if(match.tacticA==="attack") A.att+=5;
if(match.tacticA==="defend") A.def+=5;

// possession drift
match.pos=possession(match.a,match.b)+(Math.random()*10-5);

// events
if(Math.random()<0.07){

let chance=A.att/(A.att+B.def);

if(Math.random()<chance){

match.ga++;
let s=scorer(match.a);
match.log.push("⚽ "+match.a.flag+" "+s.att.toFixed(0)+" scores");

}else{

if(Math.random()<0.3){
match.gb++;
let s=scorer(match.b);
match.log.push("⚽ "+match.b.flag+" goal!");
}else{
match.log.push("❌ miss");
}

}
}

update();

if(match.min>=90) clearInterval(interval);
}

function tactic(t){
match.tacticA=t;
match.log.push("🧠 tactic: "+t);
}

function update(){
document.getElementById("score").innerText=
match.ga+" - "+match.gb;

document.getElementById("log").innerHTML=
match.log.slice(-6).join("<br>");

document.getElementById("posBar").style.width=
match.pos+"%";
}

function startNextMatch(){
let a=TEAMS[playerIndex];
let b=TEAMS[(playerIndex+3)%TEAMS.length];
startMatch(a,b);
}

function endMatch(){
clearInterval(interval);
show("groups");
renderGroups();
}

// ================= UTIL =================
function show(id){
document.querySelectorAll(".screen")
.forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

</script>

</body>
</html>
