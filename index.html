<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WC Manager V14 Arcade</title>

<style>
body {
margin:0;
font-family:"Courier New", monospace;
background:#050816;
color:#00ff99;
text-align:center;
}

/* CRT scanlines */
body::before {
content:"";
position:fixed;
top:0;left:0;
width:100%;height:100%;
background: repeating-linear-gradient(
0deg,
rgba(255,255,255,0.03),
rgba(255,255,255,0.03) 1px,
transparent 1px,
transparent 3px
);
pointer-events:none;
z-index:999;
}

body::after {
content:"";
position:fixed;
top:0;left:0;
width:100%;height:100%;
background: radial-gradient(circle at center, rgba(0,255,153,0.05), transparent 70%);
pointer-events:none;
z-index:998;
}

.screen { display:none; padding:10px; }
.screen.active { display:block; }

header {
background:#0b1b3a;
padding:10px;
color:#00e5ff;
text-shadow:0 0 10px #00e5ff;
letter-spacing:2px;
font-weight:bold;
}

.card {
background:#0d1025;
margin:6px;
padding:10px;
border:1px solid #00ff99;
box-shadow:0 0 8px #00ff99;
cursor:pointer;
}

.btn {
padding:10px;
margin:5px;
background:#111a3a;
border:1px solid #00e5ff;
color:#00e5ff;
text-transform:uppercase;
box-shadow:0 0 8px #00e5ff;
}

.smallbtn { padding:6px; font-size:12px; }

.score {
font-size:44px;
color:#ff00ff;
text-shadow:0 0 10px #ff00ff;
margin:10px;
}

.container {
background:#0b0f24;
margin:10px;
padding:6px;
border:1px solid #00ff99;
}

.bar {
height:10px;
background:linear-gradient(90deg,#00ff99,#00e5ff);
box-shadow:0 0 10px #00ff99;
}

.log {
height:160px;
overflow:auto;
background:#05060f;
text-align:left;
padding:8px;
font-size:13px;
border:1px solid #00ff99;
color:#00ff99;
}
</style>
</head>

<body>

<div id="menu" class="screen active">
<header>⚽ WC MANAGER V14 ⚽</header>
<h3>Select Your Team</h3>
<div id="teams"></div>
</div>

<div id="match" class="screen">
<header id="title"></header>

<div class="container">
Minute: <span id="min">0</span>
</div>

<div class="container">
Possession
<div id="posBar" class="bar" style="width:50%"></div>
</div>

<div class="score" id="score">0 - 0</div>

<div>
<button class="btn smallbtn" onclick="setTactic('attack')">ATTACK</button>
<button class="btn smallbtn" onclick="setTactic('balanced')">BALANCED</button>
<button class="btn smallbtn" onclick="setTactic('defend')">DEFEND</button>
</div>

<div class="log" id="log"></div>

<button class="btn" onclick="endMatch()">EXIT</button>
</div>

<script>

// ================= FLAGS =================
const FLAGS = {
Brazil:"🇧🇷",Argentina:"🇦🇷",France:"🇫🇷",England:"🏴",
Germany:"🇩🇪",Spain:"🇪🇸",Portugal:"🇵🇹",Italy:"🇮🇹",
Netherlands:"🇳🇱",Belgium:"🇧🇪",USA:"🇺🇸",Mexico:"🇲🇽",
Japan:"🇯🇵",South Korea:"🇰🇷",Morocco:"🇲🇦"
};

const NATIONS = Object.keys(FLAGS);

let TEAMS = [];
let playerIndex = null;
let match = null;
let interval = null;

// ================= INIT =================
window.onload = () => {
TEAMS = NATIONS.map(n => createTeam(n));
renderTeams();
};

function createTeam(name){
return {
name,
flag: FLAGS[name],
att: 70 + Math.random()*20,
mid: 65 + Math.random()*20,
def: 60 + Math.random()*20,
players:[
{name:"ST",att:85},
{name:"LW",att:80},
{name:"RW",att:78},
{name:"CM",att:72},
{name:"CB",att:68}
]
};
}

// ================= UI =================
function renderTeams(){
let div = document.getElementById("teams");

TEAMS.forEach((t,i)=>{
let d = document.createElement("div");
d.className = "card";
d.innerHTML = t.flag + " " + t.name;
d.onclick = () => selectTeam(i);
div.appendChild(d);
});
}

function selectTeam(i){
playerIndex = i;
show("match");
startMatch();
}

function show(id){
document.querySelectorAll(".screen")
.forEach(s => s.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

// ================= MATCH ENGINE =================
function power(t){
return t.att*0.5 + t.mid*0.3 + t.def*0.2;
}

function pickScorer(team){
let pool=[];
team.players.forEach(p=>{
for(let i=0;i<p.att;i++) pool.push(p);
});
return pool[Math.floor(Math.random()*pool.length)];
}

// ================= MATCH =================
function startMatch(){

if(interval) clearInterval(interval);

let a = TEAMS[playerIndex];
let b = TEAMS[(playerIndex+1)%TEAMS.length];

match = {
a,b,
ga:0, gb:0,
min:0,
pos:50,
log:[],
tactic:"balanced",
stateA:{pressure:30,fatigue:0,momentum:0},
stateB:{pressure:30,fatigue:0,momentum:0}
};

document.getElementById("title").innerText =
a.flag+" "+a.name+" vs "+b.flag+" "+b.name;

interval = setInterval(sim, 180);
}

// ================= TACTICS =================
function setTactic(t){
match.tactic = t;
match.log.push("🧠 "+t.toUpperCase());
}

// ================= SIM =================
function sim(){

match.min++;
document.getElementById("min").innerText = match.min;

let A = match.a;
let B = match.b;

let pA = power(A);
let pB = power(B);

// tactics
if(match.tactic === "attack") pA *= 1.15;
if(match.tactic === "defend") pA *= 0.9;

// possession
let total = pA + pB;
let posA = pA / total;

posA += match.stateA.momentum * 0.01;
posA -= match.stateB.momentum * 0.01;

posA = Math.max(0.25, Math.min(0.75, posA));

match.pos = posA * 100;

// pressure
match.stateA.pressure += posA * 2;
match.stateB.pressure += (1-posA) * 2;

// fatigue
match.stateA.fatigue += 0.2;
match.stateB.fatigue += 0.2;

function chance(att,def,press,fat){
let c = att/(att+def);
c *= press/100;
c *= (1 - fat/200);
return c;
}

let cA = chance(pA,pB,match.stateA.pressure,match.stateA.fatigue);
let cB = chance(pB,pA,match.stateB.pressure,match.stateB.fatigue);

if(Math.random() < 0.10){

if(Math.random() < cA){

if(Math.random() < 0.35){
match.ga++;
let s = pickScorer(match.a);
match.log.push("⚽ "+match.a.flag+" "+s.name);
match.stateA.momentum += 3;
match.stateB.momentum -= 2;
}else{
match.log.push("❌ miss");
}

}else if(Math.random() < cB * 0.6){

if(Math.random() < 0.30){
match.gb++;
let s = pickScorer(match.b);
match.log.push("⚽ "+match.b.flag+" counter");
match.stateB.momentum += 3;
match.stateA.momentum -= 2;
}else{
match.log.push("❌ counter miss");
}
}

}

// decay
match.stateA.momentum *= 0.97;
match.stateB.momentum *= 0.97;

// UI
document.getElementById("score").innerText =
match.ga + " - " + match.gb;

document.getElementById("log").innerHTML =
match.log.slice(-6).join("<br>");

document.getElementById("posBar").style.width =
match.pos + "%";

if(match.min >= 90){
clearInterval(interval);
match.log.push("⏱ FULL TIME");
}
}

// ================= EXIT =================
function endMatch(){
clearInterval(interval);
show("menu");
}

</script>

</body>
</html>
